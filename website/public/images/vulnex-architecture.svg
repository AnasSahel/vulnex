<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720" fill="none">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .zone { rx: 12; ry: 12; }
    .box { rx: 8; ry: 8; }
    .label { font-size: 13px; font-weight: 600; letter-spacing: 0.08em; }
    .box-text { font-size: 17px; font-weight: 600; text-anchor: middle; dominant-baseline: central; }
    .title { font-size: 26px; font-weight: 800; text-anchor: middle; }
    .subtitle { font-size: 16px; text-anchor: middle; fill: #8b949e; }
    .arrow-line { stroke-width: 2; }
  </style>

  <!-- Title -->
  <text x="550" y="30" class="title" fill="currentColor">How vulnex works</text>
  <text x="550" y="55" class="subtitle">From fragmented sources to unified intelligence</text>

  <!-- Sources Zone -->
  <rect x="20" y="80" width="1060" height="110" class="zone" fill="#4a9eed" opacity="0.10" stroke="#4a9eed" stroke-width="1"/>
  <text x="40" y="98" class="label" fill="#4a9eed">DATA SOURCES</text>

  <!-- Source boxes -->
  <rect x="40" y="115" width="160" height="52" class="box" fill="#4a9eed" opacity="0.15" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="120" y="142" class="box-text" fill="#4a9eed">NVD</text>

  <rect x="230" y="115" width="160" height="52" class="box" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="1.5"/>
  <text x="310" y="142" class="box-text" fill="#ef4444">CISA KEV</text>

  <rect x="420" y="115" width="160" height="52" class="box" fill="#f59e0b" opacity="0.12" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="500" y="142" class="box-text" fill="#f59e0b">EPSS</text>

  <rect x="610" y="115" width="160" height="52" class="box" fill="#8b5cf6" opacity="0.12" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="690" y="142" class="box-text" fill="#8b5cf6">GHSA</text>

  <rect x="800" y="115" width="160" height="52" class="box" fill="#22c55e" opacity="0.12" stroke="#22c55e" stroke-width="1.5"/>
  <text x="880" y="142" class="box-text" fill="#22c55e">OSV</text>

  <!-- Arrows: sources to vulnex -->
  <line x1="120" y1="167" x2="120" y2="230" class="arrow-line" stroke="#4a9eed" marker-end="url(#arrow-blue)"/>
  <line x1="310" y1="167" x2="310" y2="230" class="arrow-line" stroke="#ef4444" marker-end="url(#arrow-red)"/>
  <line x1="500" y1="167" x2="500" y2="230" class="arrow-line" stroke="#f59e0b" marker-end="url(#arrow-amber)"/>
  <line x1="690" y1="167" x2="690" y2="230" class="arrow-line" stroke="#8b5cf6" marker-end="url(#arrow-purple)"/>
  <line x1="880" y1="167" x2="880" y2="230" class="arrow-line" stroke="#22c55e" marker-end="url(#arrow-green)"/>

  <!-- Vulnex Zone -->
  <rect x="20" y="230" width="1060" height="250" class="zone" fill="#8b5cf6" opacity="0.08" stroke="#8b5cf6" stroke-width="1"/>
  <text x="40" y="250" class="label" fill="#8b5cf6">VULNEX</text>

  <!-- Processing pipeline -->
  <rect x="120" y="280" width="200" height="64" class="box" fill="#8b5cf6" opacity="0.12" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="220" y="306" class="box-text" fill="#8b5cf6">Parallel Fetch</text>
  <text x="220" y="326" font-size="14" text-anchor="middle" fill="#8b5cf6" opacity="0.7">&amp; Merge</text>

  <line x1="320" y1="312" x2="400" y2="312" class="arrow-line" stroke="#8b5cf6" marker-end="url(#arrow-purple)"/>

  <rect x="400" y="280" width="200" height="64" class="box" fill="#8b5cf6" opacity="0.12" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="500" y="306" class="box-text" fill="#8b5cf6">Enrich &amp;</text>
  <text x="500" y="326" font-size="14" text-anchor="middle" fill="#8b5cf6" opacity="0.7">Correlate</text>

  <line x1="600" y1="312" x2="680" y2="312" class="arrow-line" stroke="#8b5cf6" marker-end="url(#arrow-purple)"/>

  <rect x="680" y="280" width="200" height="64" class="box" fill="#8b5cf6" opacity="0.12" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="780" y="306" class="box-text" fill="#8b5cf6">Risk Score</text>
  <text x="780" y="326" font-size="14" text-anchor="middle" fill="#8b5cf6" opacity="0.7">(P0 - P4)</text>

  <!-- Supporting modules -->
  <rect x="120" y="390" width="160" height="52" class="box" fill="#06b6d4" opacity="0.10" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="200" y="418" class="box-text" fill="#06b6d4">SQLite Cache</text>

  <rect x="320" y="390" width="180" height="52" class="box" fill="#06b6d4" opacity="0.10" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="410" y="418" class="box-text" fill="#06b6d4">.vulnexignore</text>

  <rect x="540" y="390" width="180" height="52" class="box" fill="#06b6d4" opacity="0.10" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="630" y="418" class="box-text" fill="#06b6d4">SBOM Parser</text>

  <rect x="760" y="390" width="180" height="52" class="box" fill="#06b6d4" opacity="0.10" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="850" y="418" class="box-text" fill="#06b6d4">Lockfile Parser</text>

  <!-- Arrow: vulnex to output -->
  <line x1="500" y1="465" x2="500" y2="510" class="arrow-line" stroke="currentColor" opacity="0.4" marker-end="url(#arrow-default)"/>

  <!-- Output Zone -->
  <rect x="20" y="510" width="1060" height="110" class="zone" fill="#22c55e" opacity="0.08" stroke="#22c55e" stroke-width="1"/>
  <text x="40" y="530" class="label" fill="#22c55e">OUTPUT FORMATS</text>
  <text x="1000" y="530" font-size="13" fill="#22c55e" text-anchor="end" font-weight="500">pipe-friendly</text>

  <!-- Output boxes -->
  <rect x="40" y="550" width="115" height="46" class="box" fill="#22c55e" opacity="0.10" stroke="#22c55e" stroke-width="1.5"/>
  <text x="98" y="575" class="box-text" fill="#22c55e">Table</text>

  <rect x="180" y="550" width="115" height="46" class="box" fill="#22c55e" opacity="0.10" stroke="#22c55e" stroke-width="1.5"/>
  <text x="238" y="575" class="box-text" fill="#22c55e">JSON</text>

  <rect x="320" y="550" width="115" height="46" class="box" fill="#22c55e" opacity="0.10" stroke="#22c55e" stroke-width="1.5"/>
  <text x="378" y="575" class="box-text" fill="#22c55e">CSV</text>

  <rect x="460" y="550" width="115" height="46" class="box" fill="#22c55e" opacity="0.10" stroke="#22c55e" stroke-width="1.5"/>
  <text x="518" y="575" class="box-text" fill="#22c55e">SARIF</text>

  <rect x="600" y="550" width="135" height="46" class="box" fill="#22c55e" opacity="0.10" stroke="#22c55e" stroke-width="1.5"/>
  <text x="668" y="575" class="box-text" fill="#22c55e">Markdown</text>

  <rect x="760" y="550" width="115" height="46" class="box" fill="#22c55e" opacity="0.10" stroke="#22c55e" stroke-width="1.5"/>
  <text x="818" y="575" class="box-text" fill="#22c55e">YAML</text>

  <rect x="900" y="550" width="115" height="46" class="box" fill="#22c55e" opacity="0.10" stroke="#22c55e" stroke-width="1.5"/>
  <text x="958" y="575" class="box-text" fill="#22c55e">VEX</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#4a9eed"/></marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#ef4444"/></marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#f59e0b"/></marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#8b5cf6"/></marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#22c55e"/></marker>
    <marker id="arrow-default" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="currentColor" opacity="0.4"/></marker>
  </defs>
</svg>
